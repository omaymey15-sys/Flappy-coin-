name: Build and Sign FlappyCoin

on:
  push:
    tags:
      - 'v*'  # Déclenché quand on pousse un tag comme v1.0, v2.1, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      # Décoder le keystore (stocké dans les secrets GitHub)
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
      
      # Créer le fichier keystore.properties
      - name: Create keystore.properties
        run: |
          echo "storeFile=../keystore.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
      
      # Build Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease
      
      # Créer une Release GitHub
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/app-release.apk
          name: FlappyCoin ${{ github.ref_name }}
          body: |
            ## 🎮 FlappyCoin ${{ github.ref_name }}
            
            ### ✅ Changements :
            - Nouvelles fonctionnalités
            - Corrections de bugs
            - Améliorations des performances
            
            ### 📥 Installation :
            Télécharge l'APK et installe-la sur ton appareil Android.
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}